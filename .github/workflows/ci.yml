name: ci

on: push

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_backend
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_backend
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Run unit and route tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_backend
        run: npm run test

      - name: Start integration test database
        run: npm run db:test:up

      - name: Apply migrations to integration test databases
        env:
          NODE_ENV: test
          LOG_LEVEL: silent
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_backend_test_
        run: npm run prisma:migrate:test:ci

      - name: Run integration tests
        env:
          NODE_ENV: test
          LOG_LEVEL: silent
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_backend_test_
        run: npm run test:integration

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_backend
        run: npm run build
