name: ci

on: push

env:
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pulse_backend?schema=public'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Setup Integration Test Environment
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/pulse_backend_test
        run: |
          npm run db:test:up
          npm run prisma:migrate:test:ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
