version: '3.9'

services:
  postgres-test:
    image: postgres:16
    container_name: pulse-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - ./docker/test/init-test-databases.sql:/docker-entrypoint-initdb.d/init-test-databases.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10
