version: '3.9'

services:
  postgres-test:
    image: postgres:16
    container_name: pulse-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse_backend_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pulse_backend_test']
      interval: 5s
      timeout: 5s
      retries: 10
